<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Events - Karpagam Memories</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="events.css">
    <link rel="icon" type="image/webp" href="images/logofirst.webp">
</head>
<body>
    <nav id="main-nav"></nav>
    <main>
        <header>
            <h1>Upcoming College Events</h1>
            <p>Join us for the biggest Event.</p>
        </header>

        <div class="search-container">
            <span class="search-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </span>
            <input type="text" id="video-search" class="search-input" placeholder="Search events...">
        </div>

        <section id="video-grid" class="reveal">
            <article>
                <img src="images/duruva.jpg" alt="Druva 2027">
                <div class="content">
                    <h3>Druva 2027</h3>
                    <p>March , 2027 • KCE</p>
                    <p>Join us for the biggest Event.</p>
                </div>
            </article>
            <article>
                <img src="images/pongal.jpeg" alt="Pongal">
                <div class="content">
                    <h3>Pongal 2027</h3>
                    <p>January 15, 2027 • kce</p>
                    <p>Join us for the biggest Event.</p>
                </div>
            </article>
        </section>
    </main>
    <footer id="main-footer"></footer>
    <script src="script.js"></script>
</body>
</html>
