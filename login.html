<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Karpagam</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="login.css">
    <link rel="icon" type="image/webp" href="images/logofirst.webp">
</head>
<body>
    <nav id="main-nav"></nav>
    <main class="login-grid">
        <div class="login-img-container">
            <img src="https://images.unsplash.com/photo-1541339907198-e08756dedf3f?w=800" class="login-img">
        </div>
        <form id="login-form">
            <h1>Welcome Back</h1>
            <label>Gmail Address</label>
            <input type="email" required placeholder="name@gmail.com">
            <label>Password</label>
            <input type="password" required>
            <button type="submit" class="btn" style="width:100%">Sign In</button>
        </form>
    </main>
    <footer id="main-footer"></footer>
    <script src="script.js"></script>
</body>
</html>
